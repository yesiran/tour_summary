.photo {

  width: 100%;

  display: block;
  transition: transform 0.3s;
}

}
.lightbox {

  top: 0; left: 0; right: 0; bottom: 0;

  <h1>鸿博公园</h1>
  <div class="meta">2026-04-10  &middot;  共 8 张</div>
  <div class="narrative">2026年4月10日，又是一个适合在鸿博公园晨间遛弯的日子。电动车和单车静静地停在公园石碑前，天色还带着些许清晨的灰蒙蒙，却也透着一份难得的宁静。沿着小径深入，首先映入眼帘的是那一树金黄的连翘，花朵开得烂漫，枝头新叶初绽，远处还有粉色的花影若隐若现，一派春日好光景。我忍不住在花树前竖起大拇指，笑容大概和这春光一样灿烂吧，心里真是舒</div>
  <div class="gallery">
    <figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-01.jpg" alt="一树金黄" loading="lazy"><figcaption class="caption"><span class="t">一树金黄</span>连翘花朵金黄烂漫，枝头新叶初绽，远处粉色花影，尽显春日</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-02.jpg" alt="花间笑颜" loading="lazy"><figcaption class="caption"><span class="t">花间笑颜</span>男子在黄粉花树前竖起大拇指，笑容灿烂，尽享春日美好。</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-03.jpg" alt="嫩黄新绿" loading="lazy"><figcaption class="caption"><span class="t">嫩黄新绿</span>枝头嫩叶初绽，浅黄翠绿交织，在微光中展现勃勃生机。</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-04.jpg" alt="园前小憩" loading="lazy"><figcaption class="caption"><span class="t">园前小憩</span>鸿博公园石碑前，电动车与单车停靠，灰蒙蒙天色下，一片宁静</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-05.jpg" alt="桃之夭夭" loading="lazy"><figcaption class="caption"><span class="t">桃之夭夭</span>春日暖阳下，粉色桃花盛开，嫩绿新叶点缀，地面野花点点，生机</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-06.jpg" alt="春日漫步" loading="lazy"><figcaption class="caption"><span class="t">春日漫步</span>红道蜿蜒入林，白桦树旁粉花点缀，绿意盎然，宁静宜人</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-07.jpg" alt="静水浮鸭" loading="lazy"><figcaption class="caption"><span class="t">静水浮鸭</span>白鸭悠然浮游于平静池水，枯树倒影清晰，岸边绿草点缀，冬日宁</figcaption></figure><figure class="photo"><img src="images/2026-04-10-%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD-08.jpg" alt="湖畔闲憩" loading="lazy"><figcaption class="caption"><span class="t">湖畔闲憩</span>脚搭木栏，静赏湖光树影，亭台倒映，春日宁静。</figcaption></figure>

<div class="lightbox"><img src="" alt=""></div>
<script>
(function(){
  var box = document.querySelector('.lightbox');
  var img = box.querySelector('img');
  document.querySelectorAll('.photo img').forEach(function(el){
    el.addEventListener('click', function(){
      img.src = el.src;
      box.classList.add('show');
    });
  });
  box.addEventListener('click', function(){ box.classList.remove('show'); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') box.classList.remove('show');
  });
})();
</script>
