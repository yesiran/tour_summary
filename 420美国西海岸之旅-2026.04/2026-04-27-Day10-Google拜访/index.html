<header>

</header>

<div class="section-title">影像</div>
<div class="photo-grid">

    <div class="photo-card" data-index="0">
      <img src="images/hacker-google-01.jpg" alt="科技园留念" loading="lazy">
      <div class="photo-overlay">
        <div class="photo-name">科技园留念</div>
        <div class="photo-desc">三位男士在 Hacker Company 前合影，头顶蓝天绿树，面带微笑点赞，氛围轻松专业</div>
      </div>
    </div>
    <div class="photo-card" data-index="1">
      <img src="images/google-badge-01.jpg" alt="云端访客" loading="lazy">
      <div class="photo-overlay">
        <div class="photo-name">云端访客</div>

      </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <button class="nav-btn nav-prev" onclick="prevPhoto()">&#10094;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <button class="nav-btn nav-next" onclick="nextPhoto()">&#10095;</button>
</div>

<script>
const photos = [{"name": "hacker-google-01.jpg", "desc": "\u79d1\u6280\u56ed\u7559\u5ff5"}, {"name": "google-badge-01.jpg", "desc": "\u4e91\u7aef\u8bbf\u5ba2"}];
let current = 0;

function openLightbox(idx) {
  current = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function prevPhoto() {
  current = (current - 1 + photos.length) % photos.length;
  updateLightbox();
}
function nextPhoto() {
  current = (current + 1) % photos.length;
  updateLightbox();
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = 'images/' + photos[current].name;
  document.getElementById('lightbox-caption').textContent = photos[current].desc;
}

document.querySelectorAll('.photo-card').forEach((card, i) => {
  card.onclick = () => openLightbox(i);
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
});
</script>
