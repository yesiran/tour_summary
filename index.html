<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一叶琳旅程 · Tour Summary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #faf8f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .title {
      font-size: 28px;
      font-weight: 300;
      color: #2c2c2c;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #999;
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: 2px;
    }
    .trips {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .trip-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
    }
    .trip-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    }
    .trip-name {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .trip-date {
      font-size: 13px;
      color: #999;
    }
    .trip-desc {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
      line-height: 1.6;
    }
    .arrow {
      float: right;
      color: #ccc;
      font-size: 18px;
      margin-top: 2px;
    }
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">一叶琳旅程</h1>
    <p class="subtitle">用脚步丈量世界，用镜头记录时光</p>

    <div class="trips">
      <a class="trip-card" href="./%E6%97%A5%E5%87%BA-2026.04/">
        <span class="arrow">→</span>
        <div class="trip-name">晨光记</div>
        <div class="trip-date">2026年4月7日 · 清晨六时</div>
        <div class="trip-desc">中国尊破晓、金色时刻、朝阳入书房。早起三帖，生活很幸福 🌅</div>
      </a>
      <a class="trip-card" href="./%E9%B8%BF%E5%8D%9A%E5%85%AC%E5%9B%AD%E4%B8%8E%E7%90%B3%E5%A6%87%E9%81%9B%E5%BC%AF-2026.04/">
        <span class="arrow">→</span>
        <div class="trip-name">鸿博公园与琳妈遛弯</div>
        <div class="trip-date">2026年4月5日 · 清明时节</div>
        <div class="trip-desc">梨花、连翘、诸葛菜、紫叶李，与琳妈一起的春日漫步 🌸</div>
      </a>
      <a class="trip-card" href="./%E4%B8%AD%E5%9B%BD%E5%8D%9A%E7%89%A9%E9%A6%86-2026.04/">
        <span class="arrow">→</span>
        <div class="trip-name">中国博物馆之旅</div>
        <div class="trip-date">2026年4月4日</div>
        <div class="trip-desc">穿越5000年的沉思，青铜重器、商周陶俑、唐三彩... 🏛️</div>
      </a>
    </div>

    <p class="footer">一叶琳旅程 · Tour Summary</p>
  </div>
</body>
</html>
