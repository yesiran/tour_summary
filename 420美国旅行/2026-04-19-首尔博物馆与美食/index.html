  <h1>首尔博物馆与美食</h1>
  <div class="meta">2026-04-19  &middot;  共 13 张</div>
  <div class="narrative">2026年4月19日，我在首尔的旅程，仿佛一场穿越时空的漫游。清晨的延世大学，青松台旁导览牌上的森林地图与入园守则，是这片绿意盎然的初印象。</div>
  <div class="gallery">
    <figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-01.jpg" alt="校园绿意图" loading="lazy"><figcaption class="caption"><span class="t">校园绿意图</span>延世大学青松台导览牌展示森林地图与入园守则，绿意盎然</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-02.jpg" alt="翠蔓古楼" loading="lazy"><figcaption class="caption"><span class="t">翠蔓古楼</span>爬满青藤的石楼在阳光下静谧典雅，繁花绿树环绕</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-03.jpg" alt="斑驳林径" loading="lazy"><figcaption class="caption"><span class="t">斑驳林径</span>翠绿枫叶遮蔽林间小径，斑驳光影洒满地面，宁静清新</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-04.jpg" alt="参天绿意" loading="lazy"><figcaption class="caption"><span class="t">参天绿意</span>阳光穿透翠绿林间，映照笔直参天古木，宁静清新</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-05.jpg" alt="林间露天台" loading="lazy"><figcaption class="caption"><span class="t">林间露天台</span>绿树环抱的露天剧场，阳光洒在石阶上，宁静开阔</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-06.jpg" alt="镌刻的岁月" loading="lazy"><figcaption class="caption"><span class="t">镌刻的岁月</span>刻有校友姓名与年份的花岗岩石阶，阳光下诉说往昔</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-07.jpg" alt="云松映石径" loading="lazy"><figcaption class="caption"><span class="t">云松映石径</span>修剪整齐的云松沿石径错落而立，红花掩映，宁静</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-08.jpg" alt="铭刻的谢意" loading="lazy"><figcaption class="caption"><span class="t">铭刻的谢意</span>绿植环绕的黑色捐赠碑，阳光下铭刻善举，庄重宁静</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-09.jpg" alt="极简楼层志" loading="lazy"><figcaption class="caption"><span class="t">极简楼层志</span>韩国现代场馆极简导览牌，黑白金色调简洁明快</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-10.jpg" alt="异乡的警示音" loading="lazy"><figcaption class="caption"><span class="t">异乡的警示音</span>手机弹出韩文寻人警报，描述走失老人特征，异国紧张与温情</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-11.jpg" alt="机器人前合影" loading="lazy"><figcaption class="caption"><span class="t">机器人前合影</span>三人在卡通机器人背景前合影，笑容灿烂，轻松愉快</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-12.jpg" alt="跨时空微笑" loading="lazy"><figcaption class="caption"><span class="t">跨时空微笑</span>游客与AI头像在末来感展厅合影，笑容灿烂，氛围温馨</figcaption></figure><figure class="photo"><img src="images/2026-04-19-%E9%A6%96%E5%B0%94%E5%8D%9A%E7%89%A9%E9%A6%86%E4%B8%8E%E7%BE%8E%E9%A3%9F-13.jpg" alt="明洞夜行" loading="lazy"><figcaption class="caption"><span class="t">明洞夜行</span>手机地图定格首尔明洞，夜晚微凉，繁华街巷寻美食</figcaption></figure>

<div class="lightbox"><img src="" alt=""></div>
<script>
(function(){
  var box = document.querySelector('.lightbox');
  var img = box.querySelector('img');
  document.querySelectorAll('.photo img').forEach(function(el){
    el.addEventListener('click', function(){
      img.src = el.src;
      box.classList.add('show');
    });
  });
  box.addEventListener('click', function(){ box.classList.remove('show'); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') box.classList.remove('show');
  });
})();
</script>
