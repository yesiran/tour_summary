<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸿博公园与琳妈遛弯</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #faf8f5;
      color: #3a2e2a;
      font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
      line-height: 1.9;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 60px 0 50px;
      border-bottom: 1px solid #d8cfc4;
      margin-bottom: 60px;
    }

    header::before,
    header::after {
      content: "───";
      color: #c4b49a;
      display: block;
      font-size: 12px;
      letter-spacing: 6px;
    }

    header::before {
      margin-bottom: 20px;
    }

    header::after {
      margin-top: 20px;
    }

    h1 {
      font-size: 26px;
      font-weight: 400;
      letter-spacing: 6px;
      color: #3a2e2a;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 13px;
      color: #9a8e82;
      letter-spacing: 3px;
    }

    /* Chapter */
    .chapter {
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .chapter.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .chapter-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .chapter-num {
      font-size: 11px;
      color: #c4b49a;
      letter-spacing: 2px;
    }

    .chapter-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, #d8cfc4, transparent);
    }

    .chapter-title {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 4px;
      color: #3a2e2a;
      margin-bottom: 6px;
    }

    .chapter-subtitle {
      font-size: 12px;
      color: #9a8e82;
      letter-spacing: 2px;
    }

    /* Image */
    .photo-wrap {
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .photo-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 320px;
      object-fit: contain;
      background-color: #ede9e2;
      transition: transform 0.4s ease;
    }

    .photo-wrap:hover img {
      transform: scale(1.02);
    }

    .photo-hint {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
      pointer-events: none;
    }

    /* Poem */
    .poem {
      background: linear-gradient(135deg, #f5f1eb 0%, #faf8f5 100%);
      border-left: 2px solid #c4b49a;
      padding: 18px 22px;
      margin: 0;
    }

    .poem-text {
      font-size: 15px;
      color: #4a3f36;
      letter-spacing: 2px;
      line-height: 2.2;
      margin-bottom: 8px;
    }

    .poem-dynasty {
      font-size: 11px;
      color: #9a8e82;
      letter-spacing: 2px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 15, 10, 0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 28px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .lightbox-close:hover {
      color: rgba(255,255,255,0.9);
    }

    /* Footer */
    footer {
      text-align: center;
      padding-top: 50px;
      border-top: 1px solid #d8cfc4;
      color: #c4b49a;
      font-size: 11px;
      letter-spacing: 3px;
    }

    footer::before {
      content: "❀";
      display: block;
      margin-bottom: 12px;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 28px 16px 60px; }
      h1 { font-size: 20px; letter-spacing: 4px; }
      .chapter { margin-bottom: 56px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>鸿博公园与琳妈遛弯</h1>
    <p class="subtitle">2026年4月5日 · 清明时节</p>
  </header>

  <!-- 梨花 -->
  <section class="chapter" data-num="一">
    <div class="chapter-meta">
      <span class="chapter-num">壹</span>
      <div class="chapter-line"></div>
    </div>
    <h2 class="chapter-title">梨花</h2>
    <p class="chapter-subtitle">忽如一夜春风来</p>
    <div class="photo-wrap" onclick="openLightbox(this)" data-src="梨花-01.jpg">
      <img src="梨花-01.jpg" alt="梨花" style="height:300px;object-fit:contain;background:#ede9e2;">
      <span class="photo-hint">点击查看大图</span>
    </div>
    <div class="poem">
      <p class="poem-text">忽如一夜春风来，<br>千树万树梨花开。</p>
      <p class="poem-dynasty">—— 岑参《白雪歌送武判官归京》</p>
    </div>
  </section>

  <!-- 连翘 -->
  <section class="chapter" data-num="二">
    <div class="chapter-meta">
      <span class="chapter-num">贰</span>
      <div class="chapter-line"></div>
    </div>
    <h2 class="chapter-title">连翘</h2>
    <p class="chapter-subtitle">千步连翘不染尘</p>
    <div class="photo-wrap" onclick="openLightbox(this)" data-src="连翘-02.jpg">
      <img src="连翘-02.jpg" alt="连翘" style="height:300px;object-fit:contain;background:#ede9e2;">
      <span class="photo-hint">点击查看大图</span>
    </div>
    <div class="poem">
      <p class="poem-text">千步连翘不染尘，<br>降香懒画峨眉春。</p>
      <p class="poem-dynasty">—— 诗句</p>
    </div>
  </section>

  <!-- 诸葛菜 -->
  <section class="chapter" data-num="三">
    <div class="chapter-meta">
      <span class="chapter-num">叁</span>
      <div class="chapter-line"></div>
    </div>
    <h2 class="chapter-title">诸葛菜</h2>
    <p class="chapter-subtitle">黄萼裳裳绿叶稠</p>
    <div class="photo-wrap" onclick="openLightbox(this)" data-src="诸葛菜-03.jpg">
      <img src="诸葛菜-03.jpg" alt="诸葛菜" style="height:300px;object-fit:contain;background:#ede9e2;">
      <span class="photo-hint">点击查看大图</span>
    </div>
    <div class="poem">
      <p class="poem-text">黄萼裳裳绿叶稠，<br>千村欣卜榨新油。</p>
      <p class="poem-dynasty">—— 乾隆《菜花》</p>
    </div>
  </section>

  <!-- 紫叶李 -->
  <section class="chapter" data-num="四">
    <div class="chapter-meta">
      <span class="chapter-num">肆</span>
      <div class="chapter-line"></div>
    </div>
    <h2 class="chapter-title">紫叶李</h2>
    <p class="chapter-subtitle">独有李花迎面来</p>
    <div class="photo-wrap" onclick="openLightbox(this)" data-src="紫叶李-04.jpg">
      <img src="紫叶李-04.jpg" alt="紫叶李" style="height:300px;object-fit:contain;background:#ede9e2;">
      <span class="photo-hint">点击查看大图</span>
    </div>
    <div class="poem">
      <p class="poem-text">春风送暖百花开，<br>独有李花迎面来。</p>
      <p class="poem-dynasty">—— 诗句</p>
    </div>
  </section>

  <footer>清明 · 鸿博公园</footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="大图">
  </div>

  <script>
    function openLightbox(el) {
      var src = el.getAttribute('data-src');
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });

    // Scroll animation
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.chapter').forEach(function(ch) {
      observer.observe(ch);
    });
  </script>

</body>
</html>
